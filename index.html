
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AIPH PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Cairo', 'sans-serif'],
            },
            colors: {
              border: '#E5E7EB', // gray-200
              background: '#F9FAFB', // gray-50
              foreground: '#1F2937', // gray-800
              card: '#FFFFFF',
              
              primary: '#059669', // emerald-600
              'primary-dark': '#065f46', // emerald-800
              'primary-foreground': '#FFFFFF',
              
              secondary: '#F3F4F6', // gray-100
              'secondary-foreground': '#374151', // gray-700
              
              destructive: '#DC2626', // red-600
              'destructive-dark': '#991B1B', // red-800
              
              muted: '#6B7280', // gray-500
              
              accent: '#F9FAFB', // gray-50

              'slate-300': '#D1D5DB', // gray-300
              
              // Screen specific accent colors
              'theme-dashboard': '#059669', // emerald-600
              'theme-tickets': '#D97706', // amber-600
              'theme-quickLinks': '#059669', // emerald-600
              'theme-inventory': '#5B21B6', // violet-700
              'theme-users': '#BE185D', // pink-700
              'theme-departments': '#0D9488', // teal-600
              'theme-appearance': '#7C3AED', // purple-600
              'theme-settings': '#4B5563', // gray-600
              'theme-light-blue': '#10b981', // emerald-500
            },
            boxShadow: {
              'luxury': '0 10px 15px -3px rgb(0 0 0 / 0.07), 0 4px 6px -4px rgb(0 0 0 / 0.07)',
            },
            borderRadius: {
                'xl': '0.75rem',
                'lg': `0.5rem`,
                'md': `0.375rem`,
            },
            backgroundSize: {
              '200%': '200% 100%',
            },
            keyframes: {
              'pulse-red': {
                '0%, 100%': { 
                    backgroundColor: 'rgba(185, 28, 28, 0.9)',
                    boxShadow: '0 0 0 0 rgba(185, 28, 28, 0.7)'
                },
                '50%': { 
                    backgroundColor: 'rgba(220, 38, 38, 0.95)',
                    boxShadow: '0 0 20px 10px rgba(220, 38, 38, 0)'
                },
              },
              'background-pan': {
                '0%': { backgroundPosition: '0% center' },
                '100%': { backgroundPosition: '-200% center' },
              },
            },
            animation: {
              'pulse-red': 'pulse-red 1.5s infinite',
              'background-pan': 'background-pan 8s linear infinite',
            },
          },
        },
      }
    </script>
    <script src="https://unpkg.com/jspdf@latest/dist/jspdf.umd.min.js"></script>
